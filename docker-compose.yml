# Production stack: builds both images from source, no bind mounts, no
# dev-only flags. `web` serves the static Vite build via nginx and reverse-
# proxies /api to `api` (see web/nginx.conf) so the browser only ever talks
# to one origin — your domain — with no CORS involved for normal use.
#
# Local dev still works unmodified: `docker-compose up` auto-merges
# docker-compose.override.yml, which swaps in bind mounts + hot reload.
services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        # Leave unset for the default same-origin deployment (frontend and
        # API behind one domain, proxied by nginx below). Set only if the
        # API is hosted on a different origin than the frontend.
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:
