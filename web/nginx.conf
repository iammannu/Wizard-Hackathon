server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — unknown paths fall back to index.html for React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the backend so frontend + API share one origin — this is
    # what lets src/lib/api.js's window.location.origin fallback work with
    # zero config once deployed behind a single domain, and avoids CORS
    # entirely for the normal in-browser flow. `api` is the Compose service
    # name, resolved via Docker's internal DNS.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE research streaming (app/routers/intelligence.py, workspaces.py)
        # needs an unbuffered, non-cached, long-lived connection — buffering
        # here would hold back chunks until nginx's buffer fills, breaking
        # real-time streaming to the browser.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_set_header Host $host;
    }
}
