// ── Minimal router ────────────────────────────────────
const API = 'http://localhost:8000';
let currentPage = window.location.hash.slice(1) || 'home';
const listeners = [];
function navigate(page) {
  currentPage = page;
  window.location.hash = page;
  listeners.forEach(fn => fn(page));
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', () => {
  currentPage = window.location.hash.slice(1) || 'home';
  listeners.forEach(fn => fn(currentPage));
  window.scrollTo(0, 0);
});

// ── API helpers ───────────────────────────────────────
async function apiGet(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function apiSSE(path, body, onEvent) {
  const r = await fetch(API + path, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const {value, done} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try { onEvent(JSON.parse(line.slice(6))); } catch {}
    }
  }
}

// ── Mini framework ────────────────────────────────────
function el(tag, attrs, ...children) {
  const d = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(d.style, v);
    else if (k.startsWith('on') && typeof v === 'function') d.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'class') d.className = v;
    else d.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    d.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return d;
}
function html(str) {
  const d = document.createElement('div');
  d.innerHTML = str;
  return d;
}

}

listeners.push(() => render());

function renderApp() {
  const subPage = currentPage === 'app' ? 'research' : currentPage;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;height:100vh;overflow:hidden';

  // Sidebar
  const sidebar = buildSidebar(subPage);
  wrap.appendChild(sidebar);

  // Main content area
  const main = document.createElement('div');
  main.style.cssText = 'flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0';
  wrap.appendChild(main);

  function loadPage(page) {
    main.innerHTML = '';
    if (page === 'research' || page === 'app') main.appendChild(renderResearch());
    else if (page === 'screener') main.appendChild(renderScreener());
    else if (page === 'portfolio') main.appendChild(renderPortfolio());
    else if (page === 'market') main.appendChild(renderMarket());
    else if (page === 'events') main.appendChild(renderEvents());
    else main.appendChild(renderResearch());
  }

  loadPage(subPage);
  listeners.push(page => {
    const sub = (page === 'app') ? 'research' : page;
    // update sidebar active
    wrap.querySelectorAll('.app-nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === sub);
    });
    loadPage(sub);
  });

  return wrap;
}

.conf-bd-key{font-size:10px;color:var(--muted);margin-top:2px;text-transform:capitalize}
.rec-widget{background:rgba(108,92,231,0.06);border:1px solid rgba(108,92,231,0.18);border-radius:11px;padding:13px 16px}
.rec-w-label{font-size:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:6px}
.rec-w-text{font-size:13px;line-height:1.6}
.bb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bb-bull{background:rgba(0,203,169,0.06);border:1px solid rgba(0,203,169,0.2);border-radius:11px;padding:13px}
.bb-bear{background:rgba(255,107,107,0.06);border:1px solid rgba(255,107,107,0.2);border-radius:11px;padding:13px}
.bb-head{display:flex;align-items:center;margin-bottom:8px}
.bb-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.bb-prob{margin-left:auto;font-family:var(--font-m);font-size:10px}
.bb-sum{font-size:12px;line-height:1.5;margin-bottom:8px}
.bb-pts{list-style:none;display:flex;flex-direction:column;gap:3px}
.bb-pt{font-size:11px;color:var(--muted);display:flex;gap:5px;line-height:1.4}
.risks-widget{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:13px 16px}
.risks-w-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:8px}
.risk-item-r{display:flex;gap:8px;font-size:12px;color:var(--muted);padding:3px 0;line-height:1.4}
.r-input-bar{border-top:1px solid var(--border);padding:16px 24px;background:var(--surface);flex-shrink:0}
.r-input-wrap{background:var(--surface2);border:1px solid var(--border2);border-radius:13px;padding:10px 12px;display:flex;gap:10px;align-items:flex-end;transition:border-color 0.2s;max-width:900px}
.r-input-wrap:focus-within{border-color:rgba(108,92,231,0.45)}
#r-query{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-b);font-size:13px;resize:none;line-height:1.5;max-height:120px;overflow-y:auto;min-height:22px}
#r-query::placeholder{color:var(--muted)}
.r-send{width:34px;height:34px;border-radius:9px;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;cursor:pointer}

.r-ap-title{font-size:12px;font-weight:600;margin-bottom:2px}
.r-ap-sub{font-size:11px;color:var(--muted)}
.r-ap-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.r-agent{padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);transition:all 0.2s}
.r-agent.thinking{border-color:rgba(108,92,231,0.3);background:rgba(108,92,231,0.06)}

.r-agent-sig{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.sig-b{background:rgba(0,203,169,0.12);color:var(--bull)}
.sig-r{background:rgba(255,107,107,0.12);color:var(--bear)}
.sig-n{background:rgba(255,255,255,0.05);color:var(--muted)}
.r-agent-desc{font-size:10px;color:var(--muted)}
.r-dots{display:flex;gap:3px;margin-top:4px}
.r-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:dotA 1.2s infinite}
.r-dot:nth-child(2){animation-delay:0.2s}
.r-dot:nth-child(3){animation-delay:0.4s}
@keyframes dotA{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.r-spin{width:11px;height:11px;border:1.5px solid rgba(108,92,231,0.25);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.r-agent-conf{height:2px;background:var(--dim);border-radius:1px;overflow:hidden;margin-top:6px}
.r-agent-conf-fill{height:100%;border-radius:1px}
.depth-toggle{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px}
.depth-btn{padding:4px 10px;border-radius:5px;border:none;font-size:11px;cursor:pointer;transition:all 0.15s;font-family:var(--font-b)}
.depth-btn.active{background:var(--accent);color:#fff}
.depth-btn:not(.active){background:transparent;color:var(--muted)}
.depth-btn:not(.active):hover{color:var(--text)}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;transition:all 0.15s}
.clear-btn:hover{color:var(--text);border-color:var(--border2)}
</style>
<div class="r-topbar">
  <span class="r-topbar-title">Research Chat</span>
  <div class="depth-toggle" id="depth-toggle">
    <button class="depth-btn active" data-depth="quick" onclick="setDepth(this,'quick')">Quick</button>
    <button class="depth-btn" data-depth="full" onclick="setDepth(this,'full')">Full</button>
  </div>
  <span class="r-badge" id="r-badge">7 agents ready</span>
  <button class="clear-btn" onclick="clearResearch()">Clear</button>
</div>
<div class="r-body">
  <div class="r-chat">
    <div class="r-msgs" id="r-msgs">
      <div class="r-empty" id="r-empty">
        <div class="r-empty-icon">🧠</div>
        <div class="r-empty-title">What do you want to research?</div>
        <div class="r-empty-sub">Multi-agent AI runs technical, fundamental, sentiment, valuation, risk & macro analysis in parallel.</div>
        <div class="r-examples" id="r-examples"></div>
      </div>
    </div>
    <div class="r-input-bar">
      <div class="r-input-wrap">
        <textarea id="r-query" placeholder="Analyze AAPL · Compare MSFT vs GOOGL · What happens to tech if Fed cuts 100bps…" rows="1" onkeydown="rHandleKey(event)" oninput="rResize(this)"></textarea>
        <button class="r-send" id="r-send" onclick="rSend()">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div class="r-hint">Enter to send · Shift+Enter for newline · AI analysis is not financial advice</div>
    </div>
  </div>
  <div class="r-agent-panel" id="r-ap" style="display:none">
    <div class="r-ap-header"><div class="r-ap-title">Agent Activity</div><div class="r-ap-sub">Real-time reasoning</div></div>
    <div class="r-ap-list" id="r-ap-list"></div>
  </div>
</div>
  `;

  // Wire examples
  const EXAMPLES = [
    '📈 Is NVDA worth buying at current levels?',
    '⚖️ Compare Apple vs Microsoft — next 3 years',
    '🔍 Analyze Tesla\'s bull and bear case',
    '🌍 Tech stocks if Fed cuts rates 100bps?',
    '💊 Best healthcare stocks with low P/E',
    '⚡ Undervalued AI plays with strong balance sheets',
  ];
  const exGrid = wrap.querySelector('#r-examples');
  EXAMPLES.forEach(q => {
    const b = document.createElement('div');
    b.className = 'r-example';
    b.textContent = q;
    b.onclick = () => {
      wrap.querySelector('#r-query').value = q.replace(/^[^ ]+ /,'');
      rResize(wrap.querySelector('#r-query'));
    };
    exGrid.appendChild(b);
  });

  let depth = 'quick';
  let streaming = false;
  let msgs = [...researchMessages];
  let agents = {...agentStates};

  function setDepth(btn, d) {
    depth = d;
    wrap.querySelectorAll('.depth-btn').forEach(b => b.classList.toggle('active', b.dataset.depth === d));
  }
  window.setDepth = setDepth;

  function renderMsgs() {
    const container = wrap.querySelector('#r-msgs');
    const empty = wrap.querySelector('#r-empty');
    if (msgs.length && empty) empty.style.display = 'none';
    // Remove all msg rows
    container.querySelectorAll('.msg-user,.msg-ai').forEach(e => e.remove());
    msgs.forEach(m => {
      if (m.role === 'user') container.appendChild(buildUserBubble(m.text));
      else container.appendChild(buildAiBubble(m));
    });
    container.scrollTop = container.scrollHeight;
  }

  function buildUserBubble(text) {
    const d = document.createElement('div');
    d.className = 'msg-user';
    d.innerHTML = `
      <div class="msg-content" style="align-items:flex-end">
        <div class="bubble-u">${esc(text)}</div>
      </div>
      <div class="msg-av usr">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>`;
    return d;
  }

  function buildAiBubble(m) {
    const d = document.createElement('div');
    d.className = 'msg-ai';
    d.id = 'msg-' + m.id;
    let inner = '';

    if (m.tickers && m.tickers.length) inner += `<div class="ticker-chips">${m.tickers.map(t=>`<span class="t-chip">${t}</span>`).join('')}</div>`;

    inner += `<div class="bubble-a">${esc(m.text || '')}${m.streaming?'<span class="cursor"></span>':''}</div>`;

    if (!m.streaming && m.analysis) {
      const a = m.analysis;
      const conf = a.confidence || 0;
      const pct = Math.round(conf * 100);
      const cc = conf >= 0.7 ? 'var(--bull)' : conf >= 0.4 ? 'var(--warn)' : 'var(--bear)';
      const bd = a.confidence_breakdown || {};
      const bdKeys = Object.keys(bd).filter(k => k !== 'overall');

      inner += `<div class="conf-widget">
        <div class="conf-w-head">
          <span class="conf-w-label">AI Confidence</span>
          <span class="conf-w-pct" style="color:${cc}">${pct}%</span>
        </div>
        <div class="conf-w-track"><div class="conf-w-fill" style="width:${pct}%;background:${cc}"></div></div>
        ${bdKeys.length ? `<div class="conf-w-bd">${bdKeys.map(k=>`<div class="conf-bd-item"><div class="conf-bd-val">${Math.round(bd[k]*100)}%</div><div class="conf-bd-key">${k.replace(/_/g,' ')}</div></div>`).join('')}</div>` : ''}
      </div>`;

      if (a.recommendation) inner += `<div class="rec-widget"><div class="rec-w-label">Recommendation</div><div class="rec-w-text">${esc(a.recommendation)}</div></div>`;

      if (a.bull_case && a.bear_case) {
        const bl = a.bull_case, br = a.bear_case;
        inner += `<div class="bb-grid">
          <div class="bb-bull">
            <div class="bb-head"><span class="bb-label" style="color:var(--bull)">▲ Bull Case</span><span class="bb-prob" style="color:rgba(0,203,169,0.6)">${Math.round((bl.probability||0)*100)}%</span></div>
            <div class="bb-sum" style="color:var(--text)">${esc(bl.summary||'')}</div>
            <ul class="bb-pts">${(bl.key_points||[]).map(p=>`<li class="bb-pt"><span style="color:var(--bull);flex-shrink:0">+</span><span>${esc(p)}</span></li>`).join('')}</ul>
          </div>
          <div class="bb-bear">
            <div class="bb-head"><span class="bb-label" style="color:var(--bear)">▼ Bear Case</span><span class="bb-prob" style="color:rgba(255,107,107,0.6)">${Math.round((br.probability||0)*100)}%</span></div>
            <div class="bb-sum" style="color:var(--text)">${esc(br.summary||'')}</div>
            <ul class="bb-pts">${(br.key_points||[]).map(p=>`<li class="bb-pt"><span style="color:var(--bear);flex-shrink:0">−</span><span>${esc(p)}</span></li>`).join('')}</ul>
          </div>
        </div>`;
      }

      if (a.key_risks && a.key_risks.length) {
        inner += `<div class="risks-widget"><div class="risks-w-label">Key Risks</div>${a.key_risks.map(r=>`<div class="risk-item-r"><span style="color:var(--bear);flex-shrink:0">▸</span><span>${esc(r)}</span></div>`).join('')}</div>`;
      }
    }

    d.innerHTML = `
      <div class="msg-av ai">α</div>
      <div class="msg-content" id="mc-${m.id}">${inner}</div>`;
    return d;
  }

  function updateAgentPanel() {
    const entries = Object.entries(agents);
    const panel = wrap.querySelector('#r-ap');
    panel.style.display = entries.length ? 'flex' : 'none';
    const list = wrap.querySelector('#r-ap-list');
    list.innerHTML = entries.map(([name, st]) => {
      const META = {technical:'TA indicators',fundamental:'Financials & SEC',sentiment:'News & sentiment',valuation:'DCF & comps',risk:'Vol & drawdown',macro:'Economic env'};
      const cls = st.status === 'thinking' ? 'thinking' : st.signal === 'bullish' ? 'bull' : st.signal === 'bearish' ? 'bear' : '';
      const icon = st.status === 'thinking' ? '<div class="r-spin"></div>' : `<span style="color:var(--bull);font-size:12px">✓</span>`;
      const sig = st.signal ? `<span class="r-agent-sig ${st.signal==='bullish'?'sig-b':st.signal==='bearish'?'sig-r':'sig-n'}">${st.signal}</span>` : '';
      const dots = st.status === 'thinking' ? '<div class="r-dots"><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div></div>' : '';
      const confBar = st.confidence != null ? `<div class="r-agent-conf"><div class="r-agent-conf-fill" style="width:${Math.round(st.confidence*100)}%;background:${st.confidence>=0.7?'var(--bull)':st.confidence>=0.4?'var(--warn)':'var(--bear)'}"></div></div>` : '';
      return `<div class="r-agent ${cls}">
        <div class="r-agent-row">${icon}<span class="r-agent-name" style="text-transform:capitalize">${name}</span>${sig}</div>
        <div class="r-agent-desc">${META[name]||name}</div>
        ${dots}${confBar}
      </div>`;
    }).join('');
  }

  async function rSend() {
    const input = wrap.querySelector('#r-query');
    const query = input.value.trim();
    if (!query || streaming) return;
    input.value = ''; input.style.height = 'auto';
    streaming = true;
    wrap.querySelector('#r-send').disabled = true;
    wrap.querySelector('#r-badge').textContent = 'Analyzing…';

    const empty = wrap.querySelector('#r-empty');
    if (empty) empty.style.display = 'none';

    const uid = Date.now().toString();
    msgs.push({id: uid + 'u', role: 'user', text: query});

    const aid = uid + 'a';
    msgs.push({id: aid, role: 'ai', text: 'Routing to agents…', streaming: true, tickers:[], analysis: null});
    agents = {};
    renderMsgs();
    updateAgentPanel();

    function updateAi(text, isStreaming, analysis, tickers) {
      const m = msgs.find(m => m.id === aid);
      if (m) { m.text = text; m.streaming = isStreaming; if (analysis) m.analysis = analysis; if (tickers) m.tickers = tickers; }
      renderMsgs();
    }

    try {
      await apiSSE('/api/v1/intelligence/research', {query, depth}, (event) => {
        if (event.type === 'intent_parsed') {
          wrap.querySelector('#r-badge').textContent = `Intent: ${event.intent}`;
          if (event.tickers && event.tickers.length) {
            const m = msgs.find(m => m.id === aid);
            if (m) m.tickers = event.tickers;
          }
        }
        if (event.type === 'agent_start') {
          agents[event.agent] = {status:'thinking', signal:null, confidence:null};
          updateAgentPanel();
        }
        if (event.type === 'agent_complete') {
          if (agents[event.agent]) { agents[event.agent].status = 'done'; agents[event.agent].signal = event.signal; }
          updateAgentPanel();
        }
        if (event.type === 'synthesis_complete') {
          updateAi('Synthesizing results…', true, null, null);
        }
        if (event.type === 'result') {
          // Update agent confidences
          Object.entries(event.agent_outputs || {}).forEach(([name, out]) => {
            if (agents[name]) agents[name].confidence = out.confidence;
          });
          updateAgentPanel();
          updateAi(event.explanation || event.recommendation || 'Analysis complete.', false, {
            confidence: event.confidence,
            confidence_breakdown: event.confidence_breakdown,
            recommendation: event.recommendation,
            bull_case: event.bull_case,
            bear_case: event.bear_case,
            key_risks: event.key_risks,
          }, event.tickers);
        }
        if (event.type === 'error') {
          updateAi(`Error: ${event.message}`, false, null, null);
        }
      });
    } catch(err) {
      updateAi(`Could not connect to API: ${err.message}`, false, null, null);
    }

    streaming = false;
    wrap.querySelector('#r-send').disabled = false;
    wrap.querySelector('#r-badge').textContent = '7 agents ready';
    researchMessages = msgs;
    agentStates = agents;
  }
  window.rSend = rSend;

  function rHandleKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();rSend();} }
  window.rHandleKey = rHandleKey;

  function rResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
  window.rResize = rResize;

  function clearResearch() {
    msgs = []; agents = {}; researchMessages = []; agentStates = {};
    const container = wrap.querySelector('#r-msgs');
    container.querySelectorAll('.msg-user,.msg-ai').forEach(e=>e.remove());
    wrap.querySelector('#r-empty').style.display = 'flex';
    wrap.querySelector('#r-ap').style.display = 'none';
  }
  window.clearResearch = clearResearch;

  // Restore messages
  if (msgs.length) renderMsgs();
  if (Object.keys(agents).length) updateAgentPanel();

  return wrap;
}

.sc-action-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(108,92,231,0.25);background:rgba(108,92,231,0.08);color:var(--accent2);font-size:12px;cursor:pointer;transition:all 0.15s}
.sc-action-btn:hover{background:rgba(108,92,231,0.15)}
</style>
<div class="sc-topbar">
  <span class="sc-topbar-title">Stock Screener</span>
  <span style="font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(108,92,231,0.12);color:var(--accent2);border:1px solid rgba(108,92,231,0.22);font-family:var(--font-m)">NL → Filters</span>
</div>
<div class="sc-body">
  <div class="sc-hero">
    <div class="sc-title">Find your next idea.</div>
    <div class="sc-sub">Describe what you're looking for in plain English. The AI translates it to precise filters and returns matching stocks instantly.</div>
  </div>
  <div class="sc-input-row">
    <input class="sc-input" id="sc-query" placeholder="e.g. profitable tech stocks with revenue growth over 15% and low debt…" onkeydown="if(event.key==='Enter') scRun()"/>
    <button class="sc-btn" id="sc-btn" onclick="scRun()">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right:6px;vertical-align:middle"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      Screen
    </button>
  </div>
  <div class="sc-suggestions">
    ${['Profitable tech, rev growth >15%','Low P/E healthcare (<20)','High ROE with low debt','High beta momentum plays','Dividend payers, yield >2%','Small cap growth stocks'].map(q=>
      `<div class="sc-sugg" onclick="document.getElementById('sc-query').value='${q}';scRun()">${q}</div>`).join('')}
  </div>
  <div id="sc-results"></div>
</div>
  `;

  async function scRun() {
    const query = wrap.querySelector('#sc-query').value.trim();
    if (!query) return;
    const btn = wrap.querySelector('#sc-btn');
    btn.disabled = true; btn.textContent = 'Screening…';
    const results = wrap.querySelector('#sc-results');
    results.innerHTML = `<div class="sc-loading"><div style="font-size:24px;margin-bottom:12px">🔍</div>Parsing query and applying filters…</div>`;
    try {
      const data = await apiPost('/api/v1/screener/screen', {query, limit:20});
      const filtersHtml = (data.filters_applied||[]).map(f=>`<span class="sc-filter-chip">${f.field} ${f.operator} ${f.value}</span>`).join('');
      if (data.results && data.results.length > 0) {
        const rows = data.results.map(s => `
          <tr onclick="navigate('market');document.getElementById && setTimeout(()=>{const i=document.getElementById('m-ticker-input');if(i){i.value='${s.ticker}';mFetch();}},300)">
            <td class="sc-ticker-td">${s.ticker}</td>
            <td class="sc-name-td">${s.name}</td>
            <td class="sc-sector-td"><span>${s.sector}</span></td>
            <td class="sc-num-td">${s.pe_ratio!=null?s.pe_ratio.toFixed(1):'—'}</td>
            <td class="sc-num-td ${(s.revenue_growth||0)>0?'up':'down'}">${s.revenue_growth!=null?((s.revenue_growth*100).toFixed(1)+'%'):'—'}</td>
            <td class="sc-num-td">${s.net_margin!=null?((s.net_margin*100).toFixed(1)+'%'):'—'}</td>
            <td class="sc-num-td">${s.beta!=null?s.beta.toFixed(2):'—'}</td>
            <td><button class="sc-action-btn" onclick="event.stopPropagation();navigate('research');setTimeout(()=>{const i=document.getElementById('r-query');if(i){i.value='Analyze ${s.ticker}';rResize(i);}},300)">Research →</button></td>
          </tr>`).join('');
        results.innerHTML = `
          ${data.explanation ? `<div class="sc-explain">${data.explanation}</div>` : ''}
          ${filtersHtml ? `<div class="sc-filters">${filtersHtml}</div>` : ''}
          <div class="sc-results-header">
            <span class="sc-results-count">${data.results.length} stocks matched</span>
          </div>
          <div class="sc-table-wrap">
            <table class="sc-table">
              <thead><tr><th>Ticker</th><th>Name</th><th>Sector</th><th>P/E</th><th>Rev Growth</th><th>Net Margin</th><th>Beta</th><th></th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } else {
        results.innerHTML = `
          ${data.explanation ? `<div class="sc-explain">${data.explanation}</div>` : ''}
          <div class="sc-empty"><div class="sc-empty-icon">🔎</div>No stocks matched. Try relaxing the criteria.</div>`;
      }
    } catch(err) {
      results.innerHTML = `<div class="sc-empty"><div class="sc-empty-icon">⚠️</div>Error: ${err.message}</div>`;
    }
    btn.disabled = false; btn.textContent = 'Screen';
  }
  window.scRun = scRun;
  return wrap;
}

      <tbody id="p-tbody"></tbody>
    </table>
  </div>

  async function loadPortfolio() {
    const tbody = wrap.querySelector('#p-tbody');
    let totalValue = 0, totalCost = 0, totalDayPnl = 0;
    let bestTicker = '', bestChg = -Infinity;

    for (const pos of portfolioPositions) {
      let price = 0, chgPct = 0;
      try {
        const d = await apiGet(`/api/v1/market/stocks/${pos.ticker}`);
        marketCache[pos.ticker] = d;
        price = d.price || 0;
        chgPct = d.change_pct || 0;
      } catch {}

      const value = price * pos.shares;
      const cost = pos.avgCost * pos.shares;
      const pnl = value - cost;
      const pnlPct = cost > 0 ? (pnl / cost * 100) : 0;
      const dayPnl = price * pos.shares * (chgPct / 100);

      totalValue += value;
      totalCost += cost;
      totalDayPnl += dayPnl;
      if (chgPct > bestChg) { bestChg = chgPct; bestTicker = pos.ticker; }

      const up = pnl >= 0;
      const tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.onclick = () => {
        navigate('research');
        setTimeout(() => {
          const i = document.getElementById('r-query');
          if (i) { i.value = 'Analyze ' + pos.ticker; rResize(i); }
        }, 300);
      };
      tr.innerHTML = `
        <td class="p-table-ticker">${pos.ticker}</td>
        <td class="p-table-name">${pos.name}</td>
        <td class="p-table-num">${pos.shares}</td>
        <td class="p-table-num">$${pos.avgCost.toFixed(2)}</td>
        <td class="p-table-num">${price ? '$'+price.toFixed(2) : '—'}</td>
        <td class="p-table-num">${value ? '$'+value.toFixed(0) : '—'}</td>
        <td class="p-table-pnl ${up?'up':'down'}">${up?'+':'-'}$${Math.abs(pnl).toFixed(0)}</td>
        <td class="p-table-pnl ${up?'up':'down'}">${up?'+':''}${pnlPct.toFixed(1)}%</td>
        <td><button class="p-research-btn" onclick="event.stopPropagation();navigate('research');setTimeout(()=>{const i=document.getElementById('r-query');if(i){i.value='Analyze ${pos.ticker}';rResize(i);}},300)">Research →</button></td>`;
      tbody.appendChild(tr);
    }

    const totalPnl = totalValue - totalCost;
    const totalPnlPct = totalCost > 0 ? (totalPnl/totalCost*100) : 0;
    wrap.querySelector('#p-val').textContent = '$' + totalValue.toFixed(0);
    const pnlEl = wrap.querySelector('#p-pnl-total');
    pnlEl.textContent = (totalPnl>=0?'+':'-') + '$' + Math.abs(totalPnl).toFixed(0) + ' (' + (totalPnl>=0?'+':'') + totalPnlPct.toFixed(1) + '%)';
    pnlEl.style.color = totalPnl >= 0 ? 'var(--bull)' : 'var(--bear)';
    const dayEl = wrap.querySelector('#p-day-pnl');
    dayEl.textContent = (totalDayPnl>=0?'+':'-') + '$' + Math.abs(totalDayPnl).toFixed(0);
    dayEl.style.color = totalDayPnl >= 0 ? 'var(--bull)' : 'var(--bear)';
    if (bestTicker) {
      wrap.querySelector('#p-best').textContent = (bestChg>=0?'+':'') + bestChg.toFixed(2) + '%';
      wrap.querySelector('#p-best').style.color = bestChg >= 0 ? 'var(--bull)' : 'var(--bear)';
      wrap.querySelector('#p-best-sym').textContent = bestTicker;
    }
  }

  loadPortfolio();
  return wrap;
}
